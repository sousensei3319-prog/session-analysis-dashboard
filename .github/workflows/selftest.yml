name: selftest
# app.pyのselftest(ネットワーク非依存・302件+)をpush毎に実行する回帰ガード
on:
  push:
    branches: [main]
  pull_request:

jobs:
  selftest:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run selftest
        run: python app.py --selftest
